# conf/example.conf — Template for new sites
#
# Copy this file to conf/$(hostname).conf on each device and edit
# to match the site's topology. The inject-rules.sh engine resolves
# config by hostname automatically — no script changes needed.
#
# =====================================================================
# DIRECTIVE REFERENCE
# =====================================================================
#
# iptables <args>
#   Standard iptables command (-I, -A, etc.). The engine swaps to -C
#   to check existence before inserting. Positional args (e.g. -I CHAIN 1)
#   are handled correctly.
#
# ip6tables <args>
#   Same as iptables — uses -C to check before inserting. Needed for
#   IPv6 NAT rules and IPv6-specific filtering.
#
# ebtables <args>
#   Standard ebtables command (-I, -A). Existence is checked by
#   attempting -D (delete) with the same args; if the rule existed it
#   is deleted and re-added, ensuring exactly one copy.
#
# ip rule add <args>
#   Policy rule insertion. Deduplicates automatically — if more than
#   one matching rule exists, extras are removed (self-healing).
#
# ip rule del <args>
#   Policy rule deletion. Safe if the rule doesn't exist (no-op).
#
# ip route add <args>
#   Route insertion. "File exists" is treated as success.
#
# ip route del <args>
#   Route deletion. "No such process" is treated as already absent.
#
# ip -6 rule add|del <args>
# ip -6 route add|del <args>
#   IPv6 variants of the above. Same idempotency guarantees.
#
# route-sync <interface> <table> [subnet]
#   Mirror all kernel routes on <interface> into routing <table> using
#   "ip route replace" for idempotency. If [subnet] is given, only
#   routes whose destination falls within that CIDR are synced. Routes
#   that exactly match the filter prefix are skipped to avoid clobbering
#   a catchall route in the same table.
#
# sysctl -w <key>=<value>
# sysctl <key>=<value>
#   Kernel tunable. Reads the current value from /proc/sys and only
#   writes if it differs. The "-w" flag is optional. Monitored via
#   periodic heartbeat poll (same interval as iptables/ebtables).
#
# echo <value> > <path>
#   Direct write to a sysfs or procfs path. Reads the current value
#   and only writes if it differs (same pattern as sysctl). Use this
#   instead of sysctl for paths that sysctl cannot handle — e.g.
#   VLAN sub-interfaces with dots in their names (switch0.3998),
#   because sysctl parses dots as path separators and silently writes
#   to the wrong key. Monitored via periodic heartbeat poll.
#
# ---- MONITORING ----
# The rules-monitor.sh daemon auto-detects which directive types are
# present and monitors accordingly:
#   • route-sync / ip route — watches "ip monitor route" for changes
#     on referenced interfaces and tables.
#   • ip rule               — watches "ip monitor rule" for policy
#     rule flushes (UBIOS provisioning cycles).
#   • iptables / ip6tables / ebtables — periodic heartbeat poll
#     (every 10s) verifies a sample rule still exists. If missing,
#     the full config is re-injected.
#   • sysctl                — periodic heartbeat poll (every 10s)
#     verifies a sample sysctl value still matches. If drifted, the
#     full config is re-injected.
#   • echo (sysfs/procfs)   — periodic heartbeat poll (every 10s)
#     verifies a sample path still contains the expected value.
# All monitors use debouncing to survive UBIOS provisioning storms.
#
# =====================================================================
# EXAMPLES
# =====================================================================

# ---- Policy routing ----
# Route a subnet into a custom table at high priority
#ip rule add to 192.0.2.0/24 lookup 100 priority 100

# Mark-based policy route (fallback if destination-based is insufficient)
#ip rule add fwmark 0x100 table 100

# ---- Routing table population ----
# Static catchall for a subnet on a bridge interface
#ip route add 192.0.2.0/24 dev br100 table 100

# Sync /32 host routes from a tunnel into the policy table
#route-sync vti64 100 192.0.2.0/24

# ---- Traffic marking ----
# Mark inbound traffic to a subnet (for use by NAT/FORWARD rules below)
#iptables -t mangle -I PREROUTING -d 192.0.2.0/24 -j MARK --set-mark 0x100

# ---- NAT bypass ----
# Skip masquerade so source IPs are preserved across a tunnel
#iptables -t nat -I POSTROUTING -d 192.0.2.0/24 -j RETURN

# ---- Forwarding ----
# Allow forwarding for marked traffic
#iptables -t filter -I FORWARD -m mark --mark 0x100 -j ACCEPT

# =====================================================================
# IXP / PEERING FABRIC HYGIENE
# =====================================================================
#
# IX policy (AMS-IX, SIX, etc.) requires participants to:
#   • respond to ARP/ND from any participant (not just direct peers)
#   • cache neighbors for 4 hours (no aggressive re-resolution)
#   • not flood the fabric with broadcast/multicast discovery traffic
#
# >>> CANONICAL DEFENSE: AGG-SWITCH MAC ACL <<<
#
# The hardware-enforced floor for IX-policy compliance is a MAC ACL on
# the upstream UniFi aggregation switch, configured as inbound on all
# ports with a source-MAC filter that catches only this router's MAC.
# Five rules per IX VLAN, applied at the switch's forwarding ASIC,
# bypass every software failure mode the EFG could exhibit.  Wildcard
# masks shown in inverse-mask convention (0=match, FF=ignore):
#
#   Rule 1: deny  src=<router-MAC>          dst=FF:FF:FF:FF:FF:FF (exact)
#               → IPv4 broadcast (ARP) blocked
#   Rule 2: deny  src=<router-MAC>          dst=33:33:00:00:00:00 / 00:00:FF:FF:FF:FF (/16)
#               → all IPv6 multicast blocked (NS, NA, RS, RA, MLD, …)
#   Rule 3: deny  src=<router-MAC>          dst=01:80:C2:00:00:00 / 00:00:00:00:00:FF (/40)
#               → all IEEE 802.1D L2-control multicast (STP, LACP, LLDP, EAPOL, GVRP, …)
#   Rule 4: deny  src=<router-MAC>          dst=01:00:5E:00:00:00 / 00:00:00:FF:FF:FF (/24)
#               → all IPv4 multicast (mDNS, SSDP, OSPF, VRRP, PIM, IGMP, …)
#   Rule 5: deny  src=<router-MAC>          dst=01:00:0C:00:00:00 / 00:00:00:FF:FF:FF (/24)
#               → all Cisco/UBNT proprietary multicast (CDP, VTP, PAgP, UDLD, PVST+, UBNT-DISC, …)
#   (implicit final permit — unicast egress and all peer-sourced ingress
#    pass through unaffected, satisfying IX policy)
#
# Rationale for catching IPv4 multicast and Cisco proprietary even
# though we don't expect to send any: future UBIOS/firmware updates
# could enable mDNS/SSDP/UBNT-DISC on every bridge silently (we've
# already observed UBIOS auto-restoring binaries it manages); a
# misconfigured VRRP/OSPF group on the IX bridge could leak hellos;
# and the rules cost essentially nothing in switch TCAM space.
# At the trust boundary, comprehensive beats minimal.
#
# This rule set physically prevents the EFG from violating IX policy
# regardless of any UBIOS/firmware/kernel state.  The directives below
# are EFG-internal hygiene — they reduce wasted CPU and keep the
# neighbor table tidy, but they are NOT the trust boundary.  Manage the
# ACL via the UniFi UI (Switching → MAC ACLs) so it persists across
# firmware upgrades; the rules below should be regarded as belt-and-
# suspenders, not a substitute.
#
# What goes wrong on UBIOS by default:
#   1. ubios-udapi-server's nl-neighbors-poll subsystem shells out to
#      arping/ndisc6 for every neighbor on a short cycle.  This is
#      handled by the neighbor-poll-wrapper subsystem in this repo —
#      not by the rules below.
#   2. Kernel default `mcast_solicit=3` means each unresolvable peer
#      generates 3 broadcast ARPs per resolution attempt.  When BGP
#      peers go unreachable (e.g. IX blocks the port, peer reboots,
#      route servers go offline) the kernel keeps probing them
#      indefinitely.
#   3. The kernel default `base_reachable_time_ms=30000` (30 seconds)
#      causes confirmed-reachable peers to age out into STALE state
#      30s after the last confirmation, then re-probe on next outbound
#      traffic.  At BGP keepalive intervals this generates broadcasts
#      every 60-90 seconds per peer.
#
# Every directive below is targeted at one of these problems.  With
# the agg-switch ACL in place, none of the directives below is
# load-bearing for IX-policy compliance — but each still reduces
# unnecessary EFG-side work.

# ---- Block discovery broadcasts on a peering bridge ----
# UBIOS default: send `udp/10001` discovery and IGMP queries on every
# bridge.  IX policy doesn't allow these.  STP BPDUs from us are also
# disallowed since the IX switch enforces topology centrally.
#iptables -I OUTPUT -o br3998 -p udp --dport 10001 -j DROP
#iptables -I FORWARD -o br3998 -p udp --dport 10001 -j DROP
#iptables -I OUTPUT -o br3998 -p igmp -j DROP
#ebtables -A OUTPUT -o br3998 -d 01:80:c2:00:00:00/ff:ff:ff:ff:ff:f0 -j DROP

# ---- Limit kernel ARP/ND broadcast probes ----
# `mcast_solicit=1` means: when the kernel needs to resolve a neighbor
# whose entry is INCOMPLETE/FAILED, it sends ONE broadcast probe per
# attempt instead of the default three.  If no reply comes back, the
# entry transitions to FAILED and the kernel stops until traffic
# triggers a fresh resolution.
#
# Setting it to 0 silences the kernel completely (no broadcast probes
# ever) — useful as an emergency knob while you're being filtered by
# the IX, but breaks initial peer discovery, so populate static
# neighbor entries before relying on it long-term.
#sysctl -w net.ipv4.neigh.br3998.mcast_solicit=1
#sysctl -w net.ipv6.neigh.br3998.mcast_solicit=1

# ---- Drop forwarded traffic destined for IX subnets ----
# Per IX policy: only the router's IX-assigned IP may originate
# packets toward the IX subnet.  Anything that *transits* this router
# toward an IX prefix (e.g. a customer accidentally getting a default
# route via us) must be dropped.  This also stops a misrouted SNAT
# leak from generating ACL-violation logs at the IX.
#iptables  -A FORWARD -o br3998 -d 206.81.80.0/22 -j DROP
#ip6tables -A FORWARD -o br3998 -d 2001:504:16::/48 -j DROP

# ---- Suppress IPv6 router solicitations / autoconf on the IX bridge ----
# Without these, the bridge sends RS multicast on link-up and may
# accept RA from random peers, neither of which we want on a peering
# fabric where the router knows its own addressing.
#sysctl -w net.ipv6.conf.br3998.autoconf=0
#sysctl -w net.ipv6.conf.br3998.router_solicitations=0

# ---- Multi-homed ARP hygiene (apply globally, not per-interface) ----
# arp_filter=1: only respond to ARP requests when the source IP is
#               reachable via the same interface.  Prevents a request
#               on one interface being answered with a MAC for an IP
#               on another interface (a common multi-homed source of
#               IX-fabric ACL violations).
# arp_announce=2: when sending ARP requests, prefer a source IP that
#               is on the same interface as the target.  Together
#               with arp_filter=1 this enforces strict per-interface
#               source/destination scoping.
#sysctl -w net.ipv4.conf.all.arp_filter=1
#sysctl -w net.ipv4.conf.all.arp_announce=2

# ---- IPv6 examples ----
#ip -6 rule add to 2001:db8::/32 lookup 100 priority 100
#ip -6 route add 2001:db8::/32 dev br100 table 100

# ---- IPv6 NAT (ip6tables) ----
# NAT bypass for IPv6 tunnel traffic
#ip6tables -t nat -I POSTROUTING -d 2001:db8::/32 -j RETURN
#ip6tables -t nat -I POSTROUTING -s 2001:db8::/32 -j RETURN

# ---- Kernel tunables ----
# Extend ARP/NDP reachable time on a peering bridge (4 hours)
#sysctl -w net.ipv4.neigh.br3998.base_reachable_time_ms=14400000
#sysctl -w net.ipv6.neigh.br3998.base_reachable_time_ms=14400000

# ---- Direct sysfs/procfs writes ----
# Bridge ageing time (4 hours) — sysfs, no sysctl equivalent
#echo 1440000 > /sys/class/net/br3998/bridge/ageing_time
#
# ARP reachable time for VLAN sub-interfaces (sysctl fails because
# it parses "switch0.3998" as a path with dots)
#echo 14400000 > /proc/sys/net/ipv4/neigh/switch0.3998/base_reachable_time_ms
#echo 14400000 > /proc/sys/net/ipv6/neigh/switch0.3998/base_reachable_time_ms
