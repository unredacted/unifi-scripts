# ---- Monitor Registry ----
#
# Read by monitor-watchdog.sh.  One row per supervised monitor.
# Lines starting with # and blank lines are ignored.
#
# Format (whitespace-separated, exactly 5 fields per row):
#
#   <name> <pidfile> <heartbeat-file> <max_silence_sec> <launcher-path>
#
# Fields:
#   name              Short identifier used in log lines and syslog tags.
#   pidfile           Where the monitor writes its PID.  Convention:
#                       /var/run/<name>.pid
#   heartbeat-file    File the monitor `touch`es each cycle.  Convention:
#                       /var/run/<name>.heartbeat
#                     The watchdog reads its mtime to detect "stuck"
#                     processes (SIGSTOP'd, blocked on I/O, etc.).
#   max_silence_sec   How old the heartbeat may be before the monitor
#                     is considered stuck.  Set to 3× the monitor's
#                     natural cycle.  Set to 0 to skip heartbeat
#                     checking entirely (PID liveness only) — useful
#                     while migrating an old monitor that doesn't yet
#                     emit a heartbeat.
#   launcher-path     The script that (re)starts the monitor.  Each
#                     monitor in this repo is its own launcher: it
#                     kills any previous instance and backgrounds
#                     itself.  Ansible deploys each one to a stable
#                     location under /data/on_boot.d/unifi-scripts/.
#
# Example:
#   rules-monitor /var/run/rules-monitor.pid /var/run/rules-monitor.heartbeat 60 /data/on_boot.d/unifi-scripts/rules/rules-monitor.sh
#
# This default registry covers the three monitors shipped in the
# repo.  Hosts that don't run a particular monitor will simply log a
# "launcher missing" warning for the unused row — that's fine; you
# can also trim this file to only the monitors deployed on a given
# host.  The Ansible playbook is the canonical deployment surface.

# Rules monitor: 10s heartbeat cycle (HEARTBEAT=10 in rules-monitor.sh)
# → 60s threshold (3× 10s + buffer for slow heartbeat probes)
rules-monitor              /var/run/rules-monitor.pid              /var/run/rules-monitor.heartbeat              60   /data/on_boot.d/unifi-scripts/rules/rules-monitor.sh

# Switch-config monitor: 30s default INTERVAL
# → 90s threshold (3× 30s)
switch-config-monitor      /var/run/switch-config-monitor.pid      /var/run/switch-config-monitor.heartbeat      90   /data/on_boot.d/unifi-scripts/switch-config/switch-config-monitor.sh

# Neighbor-poll-wrapper monitor: 30s default INTERVAL
# → 90s threshold (3× 30s)
neighbor-poll-wrapper-monitor  /var/run/neighbor-poll-wrapper-monitor.pid  /var/run/neighbor-poll-wrapper-monitor.heartbeat  90   /data/on_boot.d/unifi-scripts/neighbor-poll-wrapper/neighbor-poll-wrapper-monitor.sh
